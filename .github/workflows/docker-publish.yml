name: Publish Docker image to GHCR

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-publish:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      packages: write
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Extract OctoPrint version from Dockerfile
        id: get_version
        run: |
          OCTOPRINT_VERSION=$(grep -o 'octoprint/octoprint:[^@]\+' Dockerfile | cut -d':' -f2)
          echo "OctoPrint Version: $OCTOPRINT_VERSION"
          if [ -z "$OCTOPRINT_VERSION" ]; then 
            echo "Failed to extract OctoPrint version" >&2
            exit 1
          fi
          echo "octoprint_version=$OCTOPRINT_VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          tags: |
            ghcr.io/kvanzuijlen/octoprint-bambu:${{ steps.get_version.outputs.octoprint_version }}-${{ github.run_number }}
            ghcr.io/kvanzuijlen/octoprint-bambu:latest
            ghcr.io/kvanzuijlen/octoprint-bambu:${{ github.run_number }}
          labels: |
            org.opencontainers.image.source=${{ github.event.repository.html_url }}
            org.opencontainers.image.created=${{ github.event.repository.created_at }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.get_version.outputs.octoprint_version }}-${{ github.run_number }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          tag_name: v${{ steps.get_version.outputs.octoprint_version }}-${{ github.run_number }}
          name: OctoPrint Bambu - ${{ steps.get_version.outputs.octoprint_version }}-${{ github.run_number }}
          body: |
            Docker image for OctoPrint Bambu based on OctoPrint version ${{ steps.get_version.outputs.octoprint_version }}.
            Build number: ${{ github.run_number }}
          draft: false
          prerelease: false
          generate_release_notes: true
  
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    if: ${{ github.event_name == 'pull_request' }}
  
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
  
      - name: Extract OctoPrint version from Dockerfile
        id: get_version
        run: |
          OCTOPRINT_VERSION=$(grep -o 'octoprint/octoprint:[^@]\+' Dockerfile | cut -d':' -f2)
          echo "OctoPrint Version: $OCTOPRINT_VERSION"
          if [ -z "$OCTOPRINT_VERSION" ]; then 
            echo "Failed to extract OctoPrint version" >&2
            exit 1
          fi
          echo "octoprint_version=$OCTOPRINT_VERSION" >> "$GITHUB_OUTPUT"
  
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
  
      - name: Build and push Docker image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          push: false
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          tags: |
            ghcr.io/kvanzuijlen/octoprint-bambu:${{ steps.get_version.outputs.octoprint_version }}-${{ github.run_number }}
            ghcr.io/kvanzuijlen/octoprint-bambu:latest
            ghcr.io/kvanzuijlen/octoprint-bambu:${{ github.run_number }}
          labels: |
            org.opencontainers.image.source=${{ github.event.repository.html_url }}
            org.opencontainers.image.created=${{ github.event.repository.created_at }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.get_version.outputs.octoprint_version }}-${{ github.run_number }}
